<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级反馈表 - 管理后台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Login overlay -->
  <div id="login-overlay">
    <div class="login-card">
      <h1>班级反馈表</h1>
      <p class="login-subtitle">管理后台</p>
      <input id="login-password" type="password" class="login-input" placeholder="请输入管理密码" autofocus>
      <button id="login-btn" class="btn-primary">登 录</button>
      <p id="login-error" class="login-error" style="display:none"></p>
    </div>
  </div>

  <!-- App shell (hidden before login) -->
  <div id="app-shell" style="display:none">
    <nav id="sidebar">
      <div class="sidebar-header">
        <h2>管理后台</h2>
      </div>
      <ul id="nav-list">
        <li class="active" data-module="overview">
          <span class="nav-icon">&#x25C6;</span>概览
        </li>
        <li data-module="teachers">
          <span class="nav-icon">&#x2630;</span>教师管理
        </li>
        <li data-module="classes">
          <span class="nav-icon">&#x229E;</span>班级浏览
        </li>
        <li data-module="feedback">
          <span class="nav-icon">&#x25C9;</span>反馈数据
        </li>
        <li data-module="templates">
          <span class="nav-icon">&#x25A0;</span>模板管理
        </li>
        <li data-module="export">
          <span class="nav-icon">&#x21E7;</span>数据导出
        </li>
        <li data-module="logs">
          <span class="nav-icon">&#x2637;</span>操作日志
        </li>
      </ul>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn-text">退出登录</button>
      </div>
    </nav>
    <main id="content"></main>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- CloudBase Web SDK -->
  <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
